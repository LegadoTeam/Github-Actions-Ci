name: Build SonoBus Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout SonoBus repo with TOKEN_MGZ
        uses: actions/checkout@v4
        with:
          repository: mgz0227/sonobus
          token: ${{ secrets.TOKEN_MGZ }}
          ref: sonobus8
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
          clean: true

      # 不缓存整个 CMake build 目录，避免 CMakeCache.txt 残留旧 generator
      - name: Clean old CMake build directory
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

      - name: Setup MSBuild for VS2022
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: 'latest'

      - name: Check tool versions
        shell: pwsh
        run: |
          cmake --version
          msbuild -version
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -products * -version "[17.0,18.0)" -property installationPath

      - name: Install Cygwin
        shell: pwsh
        run: |
          choco install cygwin --no-progress -y
          curl.exe -L -o setup-x86_64.exe https://cygwin.com/setup-x86_64.exe
          .\setup-x86_64.exe -q -n -N -d -R C:\tools\cygwin -s https://mirrors.kernel.org/sourceware/cygwin/ -P make,gcc-core,gcc-g++,pkg-config
          echo "C:\tools\cygwin\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check Cygwin bash
        shell: pwsh
        run: |
          C:\tools\cygwin\bin\bash.exe --version
          C:\tools\cygwin\bin\bash.exe -lc "uname -a"
          C:\tools\cygwin\bin\bash.exe -lc "pwd"
          C:\tools\cygwin\bin\bash.exe -lc "ls -la"

      - name: Run setupcmakewin.sh
        shell: C:\tools\cygwin\bin\bash.exe --noprofile --norc -eo pipefail {0}
        run: |
          set -euxo pipefail

          if [ ! -f ./setupcmakewin.sh ]; then
            echo "ERROR: setupcmakewin.sh not found"
            ls -la
            exit 1
          fi

          # 修复 Windows CRLF 换行符问题
          sed -i 's/\r$//' ./setupcmakewin.sh

          chmod +x ./setupcmakewin.sh

          echo "===== setupcmakewin.sh first 200 lines ====="
          sed -n '1,200p' ./setupcmakewin.sh

          echo "===== run setupcmakewin.sh ====="
          bash -x ./setupcmakewin.sh

      - name: Run buildcmake.sh
        shell: C:\tools\cygwin\bin\bash.exe --noprofile --norc -eo pipefail {0}
        run: |
          set -euxo pipefail

          if [ ! -f ./buildcmake.sh ]; then
            echo "ERROR: buildcmake.sh not found"
            ls -la
            exit 1
          fi

          # 修复 Windows CRLF 换行符问题
          sed -i 's/\r$//' ./buildcmake.sh

          chmod +x ./buildcmake.sh

          echo "===== buildcmake.sh first 200 lines ====="
          sed -n '1,200p' ./buildcmake.sh

          echo "===== run buildcmake.sh ====="
          bash -x ./buildcmake.sh

      - name: Remove .lib and .exp files
        shell: pwsh
        run: |
          $artefacts = "build/SonoBus_artefacts/Release"
          if (Test-Path $artefacts) {
            Get-ChildItem $artefacts -Recurse -Include *.lib, *.exp | Remove-Item -Force
            Write-Host "Removed .lib and .exp files from $artefacts"
          } else {
            Write-Warning "Artefacts directory not found: $artefacts"
          }

      - name: Compress Release folder
        shell: pwsh
        run: |
          $releasePath = "build/SonoBus_artefacts/Release"
          if (!(Test-Path $releasePath)) {
            Write-Error "Release folder not found: $releasePath"
            exit 1
          }

          Compress-Archive -Path "$releasePath/*" -DestinationPath SonoBus_Windows.zip -Force

      - name: Upload artifact for manual builds
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: SonoBus_Windows
          path: SonoBus_Windows.zip

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v1
        with:
          files: SonoBus_Windows.zip
          tag_name: ${{ github.ref_name }}
          name: SonoBus ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}
